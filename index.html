<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sattu & Co.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--sand:#F5F0E8;--clay:#C4773A;--clay-light:#F0E0CC;--clay-dark:#8B4F1F;--ink:#1E1A14;--muted:#7A6E62;--white:#FFFDF9}
body{background:var(--sand);font-family:'Inter',sans-serif;color:var(--ink)}
.header{background:var(--white);border-bottom:1px solid rgba(196,119,58,0.15);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--clay-dark)}
.brand span{color:var(--clay);font-style:italic}
.basket-btn{display:flex;align-items:center;gap:8px;background:var(--clay);color:#fff;border:none;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s}
.basket-btn:hover{background:var(--clay-dark)}
.basket-count{background:#fff;color:var(--clay);border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.hero{position:relative;height:340px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--clay-dark)}
.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:rgba(20,12,4,0.55)}
.hero-content{position:relative;z-index:2;text-align:center;color:#fff;padding:0 24px}
.hero-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,220,150,0.85);margin-bottom:12px}
.hero-title{font-family:'Playfair Display',serif;font-size:40px;font-weight:400;line-height:1.15;margin-bottom:10px}
.hero-title em{font-style:italic;color:#F0C97A}
.hero-sub{color:rgba(255,255,255,0.75);font-size:14px;max-width:360px;margin:0 auto}
.section-label{text-align:center;padding:32px 32px 18px;font-family:'Playfair Display',serif;font-size:24px;color:var(--clay-dark);font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;padding:0 28px 48px;max-width:900px;margin:0 auto}
.card{background:var(--white);border-radius:16px;overflow:hidden;border:1px solid rgba(196,119,58,0.12);transition:transform 0.15s,border-color 0.15s}
.card:hover{transform:translateY(-3px);border-color:rgba(196,119,58,0.3)}
.card-img{width:100%;height:150px;object-fit:cover;display:block}
.card-ph{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--clay-light)}
.card-body{padding:14px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;margin-bottom:3px}
.card-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.price{font-size:15px;font-weight:500;color:var(--clay-dark)}
.add-btn{background:var(--clay-light);color:var(--clay-dark);border:none;padding:7px 15px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s}
.add-btn:hover{background:var(--clay);color:#fff}
.add-btn.added{background:var(--clay);color:#fff}
.overlay{display:none;position:fixed;inset:0;background:rgba(30,26,20,0.35);z-index:200}
.overlay.open{display:block}
.panel{position:fixed;right:-380px;top:0;bottom:0;width:350px;background:var(--white);border-left:1px solid rgba(196,119,58,0.15);z-index:201;transition:right 0.25s ease;display:flex;flex-direction:column}
.panel.open{right:0}
.panel-head{padding:20px 22px;border-bottom:1px solid rgba(196,119,58,0.12);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:400}
.close-btn{background:none;border:1px solid rgba(196,119,58,0.2);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--muted)}
.close-btn:hover{border-color:var(--clay);color:var(--clay)}
.panel-items{flex:1;overflow-y:auto;padding:14px 22px}
.empty{text-align:center;padding:56px 0;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px}
.b-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(196,119,58,0.08)}
.b-thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0}
.b-ph{width:46px;height:46px;border-radius:10px;background:var(--clay-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.b-info{flex:1}
.b-name{font-size:13px;font-weight:500;margin-bottom:2px}
.b-price{font-size:12px;color:var(--muted)}
.qty{display:flex;align-items:center;gap:6px}
.qty-btn{background:var(--sand);border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;color:var(--clay-dark)}
.qty-btn:hover{background:var(--clay-light)}
.qty-n{font-size:14px;font-weight:500;min-width:16px;text-align:center}
.panel-foot{padding:18px 22px;border-top:1px solid rgba(196,119,58,0.12)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.total-lbl{color:var(--muted);font-size:14px}
.total-amt{font-family:'Playfair Display',serif;font-size:22px;color:var(--clay-dark)}
.wa-btn{width:100%;background:#25D366;color:#fff;border:none;padding:13px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.wa-btn:hover{background:#1ebe5d}
.pin-field{margin-bottom:12px}
.pin-lbl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.pin-input{width:100%;padding:10px 14px;border:1px solid rgba(196,119,58,0.25);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;letter-spacing:1px}
.pin-input.textarea{min-height:64px;resize:vertical;letter-spacing:normal;line-height:1.4}
.pin-input:focus{outline:none;border-color:var(--clay)}
.delivery-info{font-size:12px;margin-bottom:10px;min-height:16px;line-height:1.4}
.delivery-info.ok{color:var(--clay-dark)}
.delivery-info.warn{color:#b45309}
.delivery-info.err{color:#c0392b}
.sub-row{margin-bottom:6px}
.sub-row .total-lbl,.sub-row span{font-size:13px}
.wa-btn:disabled{opacity:0.45;cursor:not-allowed}
.wa-btn:disabled:hover{background:#25D366}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--clay-dark);color:#fff;padding:9px 20px;border-radius:50px;font-size:13px;z-index:300;transition:transform 0.25s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="header">
  <div class="brand">Sattu <span>& Co.</span></div>
  <button class="basket-btn" onclick="openPanel()">🛍 Basket <span class="basket-count" id="bCount">0</span></button>
</div>

const STORE_PIN = '700046';
const STORE_COORDS = { lat: 22.5425164, lon: 88.3836342 };
let basket = {};
let delivery = { status: 'idle', fee: 0, distance: null, pin: '' };
let pinTimer;

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, p = Math.PI / 180;
  const a = Math.sin((lat2 - lat1) * p / 2) ** 2 + Math.cos(lat1 * p) * Math.cos(lat2 * p) * Math.sin((lon2 - lon1) * p / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

async function geocodePin(pin) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${pin}&country=India&format=json&limit=1`, {
    headers: { 'User-Agent': 'SattuAndCo/1.0' }
  });
  const data = await res.json();
  if (!data.length) return null;
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
}

function getDeliveryFee(km) {
  if (km <= 10) return { fee: 150, deliverable: true };
  if (km <= 15) return { fee: 200, deliverable: true };
  return { fee: 0, deliverable: false };
}

function onDeliveryDetailsInput() {
  const phoneEl = document.getElementById('delPhone');
  phoneEl.value = phoneEl.value.replace(/\D/g, '').slice(0, 10);
  updateTotals();
}

function getPhone() {
  return document.getElementById('delPhone').value.replace(/\D/g, '');
}

function getAddress() {
  return document.getElementById('delAddress').value.trim();
}

function isDeliveryDetailsValid() {
  return getPhone().length === 10 && getAddress().length >= 10;
}

function onPinInput() {
  const el = document.getElementById('delPin');
  const pin = el.value.replace(/\D/g, '').slice(0, 6);
  el.value = pin;
  clearTimeout(pinTimer);
  if (pin.length < 6) {
    delivery = { status: 'idle', fee: 0, distance: null, pin: '' };
    updateTotals();
    return;
  }
  delivery = { status: 'loading', fee: 0, distance: null, pin };
  updateTotals();
  pinTimer = setTimeout(() => calcDelivery(pin), 400);
}

async function calcDelivery(pin) {
  if (delivery.pin !== pin) return;
  try {
    const coords = await geocodePin(pin);
    if (delivery.pin !== pin) return;
    if (!coords) {
      delivery = { status: 'invalid', fee: 0, distance: null, pin };
    } else {
      const km = haversineKm(STORE_COORDS.lat, STORE_COORDS.lon, coords.lat, coords.lon);
      const { fee, deliverable } = getDeliveryFee(km);
      delivery = { status: deliverable ? 'ok' : 'undeliverable', fee, distance: km, pin };
    }
  } catch {
    if (delivery.pin === pin) delivery = { status: 'error', fee: 0, distance: null, pin };
  }
  updateTotals();
}

function updateTotals() {
  const items = Object.values(basket);
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const info = document.getElementById('deliveryInfo');
  const delRow = document.getElementById('deliveryRow');
  const btn = document.getElementById('checkoutBtn');
  document.getElementById('subAmt').textContent = '₹' + subtotal;

  let deliveryFee = 0;
  let canOrder = items.length > 0;
  info.className = 'delivery-info';
  delRow.style.display = 'none';

  if (delivery.status === 'loading') {
    info.textContent = 'Calculating delivery…';
    canOrder = false;
  } else if (delivery.status === 'ok') {
    deliveryFee = delivery.fee;
    delRow.style.display = 'flex';
    document.getElementById('deliveryAmt').textContent = '₹' + deliveryFee;
    info.className = 'delivery-info ok';
    info.textContent = `${delivery.distance.toFixed(1)} km from us — delivery ₹${deliveryFee}`;
    if (!isDeliveryDetailsValid()) {
      canOrder = false;
      if (!getPhone().length || getPhone().length < 10) {
        info.textContent += ' — enter your phone number';
      } else if (!getAddress().length) {
        info.textContent += ' — enter your delivery address';
      }
    }
  } else if (delivery.status === 'undeliverable') {
    info.className = 'delivery-info err';
    info.textContent = `Sorry, we don't deliver to PIN ${delivery.pin} (${delivery.distance.toFixed(1)} km — beyond 15 km)`;
    canOrder = false;
  } else if (delivery.status === 'invalid') {
    info.className = 'delivery-info err';
    info.textContent = 'Invalid PIN code. Please check and try again.';
    canOrder = false;
  } else if (delivery.status === 'error') {
    info.className = 'delivery-info err';
    info.textContent = 'Could not check delivery. Please try again.';
    canOrder = false;
  } else if (items.length) {
    info.textContent = 'Enter your 6-digit delivery PIN to see charges.';
    canOrder = false;
  } else {
    info.textContent = '';
    canOrder = false;
  }

  document.getElementById('totalAmt').textContent = '₹' + (subtotal + deliveryFee);
  btn.disabled = !canOrder;
}

document.getElementById('grid').innerHTML = PRODUCTS.map(p=>`
  <div class="card">
    ${p.img ? `<img class="card-img" src="${p.img}" alt="${p.name}"/>` : `<div class="card-ph">${p.emoji}</div>`}
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-footer">
        <div class="price">₹${p.price}</div>
        <button class="add-btn" id="b${p.id}" onclick="add(${p.id})">Add</button>
      </div>
    </div>
  </div>`).join('');

function add(id){
  const p=PRODUCTS.find(x=>x.id===id);
  if(!basket[id]) basket[id]={...p,qty:0};
  basket[id].qty++;
  updateUI();
  showToast(p.name+' added');
  const btn=document.getElementById('b'+id);
  btn.textContent='Added ✓';btn.classList.add('added');
  setTimeout(()=>{const b=document.getElementById('b'+id);if(b){b.textContent='Add';b.classList.remove('added');}},1000);
}

function chQty(id,d){
  if(!basket[id])return;
  basket[id].qty+=d;
  if(basket[id].qty<=0)delete basket[id];
  updateUI();
}

function updateUI(){
  const items=Object.values(basket);
  const count=items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('bCount').textContent=count;
  const el=document.getElementById('panelItems');
  if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">🛒</div>Your basket is empty</div>';updateTotals();return;}
  el.innerHTML=items.map(i=>`
    <div class="b-item">
      ${i.img?`<img class="b-thumb" src="${i.img}" alt="${i.name}"/>`:`<div class="b-ph">${i.emoji}</div>`}
      <div class="b-info"><div class="b-name">${i.name}</div><div class="b-price">₹${i.price} each</div></div>
      <div class="qty">
        <button class="qty-btn" onclick="chQty(${i.id},-1)">−</button>
        <span class="qty-n">${i.qty}</span>
        <button class="qty-btn" onclick="chQty(${i.id},1)">+</button>
      </div>
    </div>`).join('');
  updateTotals();
}

function openPanel(){document.getElementById('panel').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closePanel(){document.getElementById('panel').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

function checkout(){
  const items=Object.values(basket);
  if(!items.length){showToast('Your basket is empty');return;}
  if(delivery.status!=='ok'){showToast('Please enter a valid deliverable PIN code');return;}
  const phone=getPhone();
  const address=getAddress();
  if(phone.length!==10){showToast('Please enter a valid 10-digit phone number');return;}
  if(address.length<10){showToast('Please enter your full delivery address');return;}
  const subtotal=items.reduce((s,i)=>s+i.price*i.qty,0);
  const total=subtotal+delivery.fee;
  const lines=items.map(i=>`• ${i.qty}x ${i.name} — ₹${i.price*i.qty}`).join('\n');
  const msg=`🛒 *New Order — Sattu & Co.*\n\n${lines}\n\n📍 *Delivery details*\nPIN: ${delivery.pin}\nAddress: ${address}\nPhone: ${phone}\n\nSubtotal: ₹${subtotal}\nDelivery (${delivery.distance.toFixed(1)} km): ₹${delivery.fee}\n*Total: ₹${total}*\n\nPlease confirm my order!`;
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
}
updateTotals();
</script>
</body>
</html>
